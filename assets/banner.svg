<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="GoonerBot - the group gremlin">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#140d2c"/>
      <stop offset="0.55" stop-color="#0d0a22"/>
      <stop offset="1" stop-color="#1a1140"/>
    </linearGradient>
    <linearGradient id="bneon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#36f0c4"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <linearGradient id="bhead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2350"/>
      <stop offset="1" stop-color="#171232"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.2" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="bglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bbg)"/>
  <rect width="1280" height="360" fill="url(#spot)"/>

  <!-- dotted grid accent -->
  <g fill="#7c5cff" opacity="0.12">
    <circle cx="60" cy="60" r="3"/><circle cx="120" cy="60" r="3"/><circle cx="180" cy="60" r="3"/>
    <circle cx="60" cy="120" r="3"/><circle cx="120" cy="120" r="3"/>
    <circle cx="1220" cy="300" r="3"/><circle cx="1160" cy="300" r="3"/><circle cx="1100" cy="300" r="3"/>
    <circle cx="1220" cy="240" r="3"/><circle cx="1160" cy="240" r="3"/>
  </g>

  <!-- bot mark -->
  <g transform="translate(96,70)">
    <line x1="110" y1="20" x2="110" y2="60" stroke="url(#bneon)" stroke-width="8" stroke-linecap="round" filter="url(#bglow)"/>
    <circle cx="110" cy="12" r="11" fill="url(#bneon)" filter="url(#bglow)"/>
    <rect x="20" y="60" width="180" height="150" rx="38" fill="url(#bhead)" stroke="url(#bneon)" stroke-width="5"/>
    <g filter="url(#bglow)">
      <path d="M52 128 q28 -24 56 0" fill="none" stroke="#36f0c4" stroke-width="13" stroke-linecap="round"/>
      <path d="M114 128 q28 -24 56 0" fill="none" stroke="#36f0c4" stroke-width="13" stroke-linecap="round"/>
    </g>
    <path d="M64 158 q46 46 92 0" fill="none" stroke="#7c5cff" stroke-width="11" stroke-linecap="round" filter="url(#bglow)"/>
    <rect x="4" y="112" width="16" height="46" rx="8" fill="url(#bneon)" opacity="0.85"/>
    <rect x="200" y="112" width="16" height="46" rx="8" fill="url(#bneon)" opacity="0.85"/>
  </g>

  <!-- wordmark -->
  <text x="360" y="170" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="104" font-weight="800" fill="#ffffff" letter-spacing="-2">Gooner<tspan fill="url(#bneon)">Bot</tspan></text>
  <text x="364" y="224" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="600" fill="#b9b2e6">the group gremlin · entertainment · roleplay · memes · memory</text>

  <!-- pills -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700">
    <rect x="364" y="252" width="172" height="44" rx="22" fill="#171232" stroke="url(#bneon)" stroke-width="2"/>
    <text x="450" y="281" fill="#cfe9ff" text-anchor="middle">TypeScript</text>
    <rect x="548" y="252" width="138" height="44" rx="22" fill="#171232" stroke="url(#bneon)" stroke-width="2"/>
    <text x="617" y="281" fill="#cfe9ff" text-anchor="middle">grammY</text>
    <rect x="698" y="252" width="150" height="44" rx="22" fill="#171232" stroke="url(#bneon)" stroke-width="2"/>
    <text x="773" y="281" fill="#cfe9ff" text-anchor="middle">MongoDB</text>
    <rect x="860" y="252" width="190" height="44" rx="22" fill="#171232" stroke="url(#bneon)" stroke-width="2"/>
    <text x="955" y="281" fill="#cfe9ff" text-anchor="middle">multi-LLM</text>
  </g>

  <rect x="0" y="354" width="1280" height="6" fill="url(#bneon)"/>
</svg>
